name: tests

on:
  push:
  pull_request:

jobs:
  analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-replication.txt
      - run: python analyze_question_suitability.py
      - run: git diff --exit-code outputs/question_ranking.csv
      - run: python -m unittest discover -s tests
